version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: qa-healthcare-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: qa_healthcare
      MYSQL_USER: qa_user
      MYSQL_PASSWORD: qa123456
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./server/init-scripts:/docker-entrypoint-initdb.d
    networks:
      - qa-network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: qa-healthcare-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root123456
      MYSQL_ROOT_PASSWORD: root123456
    ports:
      - "8080:80"
    depends_on:
      - mysql
    networks:
      - qa-network

volumes:
  mysql_data:

networks:
  qa-network:
    driver: bridge